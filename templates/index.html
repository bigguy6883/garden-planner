<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1d23;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #252830;
            border-bottom: 1px solid #3a3d45;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #topbar select, #topbar button {
            padding: 6px 10px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #2f323a;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
        }
        #topbar select { min-width: 140px; }
        #topbar button:hover { background: #3a3d45; }
        #topbar .sep { width: 1px; height: 24px; background: #3a3d45; margin: 0 4px; }
        .btn-danger { border-color: #c0392b !important; }
        .btn-danger:hover { background: #c0392b !important; }
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #20232a;
            border-right: 1px solid #3a3d45;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar-header {
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #3a3d45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #palette {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        #palette::-webkit-scrollbar { width: 6px; }
        #palette::-webkit-scrollbar-thumb { background: #3a3d45; border-radius: 3px; }
        .palette-category {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            padding: 8px 4px 4px;
            letter-spacing: 0.5px;
        }
        .palette-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .palette-item:hover { background: #2a2d35; }
        .palette-item.selected { background: #2a4a2a; outline: 1px solid #4a8a4a; }
        .palette-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        #add-plant-btn {
            margin: 8px;
            padding: 6px;
            border: 1px dashed #3a3d45;
            border-radius: 4px;
            background: transparent;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }
        #add-plant-btn:hover { border-color: #5a5d65; color: #bbb; }
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #garden-canvas {
            display: block;
            cursor: crosshair;
        }
        #tooltip {
            display: none;
            position: absolute;
            background: #2f323a;
            border: 1px solid #4a4d55;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #252830;
            border: 1px solid #3a3d45;
            border-radius: 8px;
            padding: 20px;
            min-width: 300px;
        }
        .modal h3 { margin-bottom: 12px; font-size: 16px; }
        .modal label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin: 8px 0 4px;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #1a1d23;
            color: #e0e0e0;
            font-size: 13px;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .modal-buttons button {
            padding: 6px 16px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #2f323a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 13px;
        }
        .modal-buttons button.primary { background: #2a6a2a; border-color: #3a8a3a; }
        .modal-buttons button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div id="topbar"></div>
    <div id="main">
        <div id="sidebar">
            <div id="sidebar-header"></div>
            <div id="palette"></div>
            <button id="add-plant-btn"></button>
        </div>
        <div id="canvas-container">
            <canvas id="garden-canvas"></canvas>
            <div id="tooltip"></div>
        </div>
    </div>
    <div id="plant-modal" class="modal-overlay"></div>

<script>
(function() {
    // --- Build topbar ---
    const topbar = document.getElementById('topbar');

    const gardenLabel = document.createElement('span');
    gardenLabel.textContent = 'Garden:';
    gardenLabel.style.fontSize = '13px';
    topbar.appendChild(gardenLabel);

    const gardenSelect = document.createElement('select');
    gardenSelect.id = 'garden-select';
    topbar.appendChild(gardenSelect);

    const newGardenBtn = document.createElement('button');
    newGardenBtn.id = 'new-garden-btn';
    newGardenBtn.textContent = 'New Garden';
    topbar.appendChild(newGardenBtn);

    const sep1 = document.createElement('div');
    sep1.className = 'sep';
    topbar.appendChild(sep1);

    const planLabel = document.createElement('span');
    planLabel.textContent = 'Plan:';
    planLabel.style.fontSize = '13px';
    topbar.appendChild(planLabel);

    const planSelect = document.createElement('select');
    planSelect.id = 'plan-select';
    topbar.appendChild(planSelect);

    const newPlanBtn = document.createElement('button');
    newPlanBtn.id = 'new-plan-btn';
    newPlanBtn.textContent = 'New Plan';
    topbar.appendChild(newPlanBtn);

    const dupBtn = document.createElement('button');
    dupBtn.id = 'dup-btn';
    dupBtn.textContent = 'Duplicate';
    topbar.appendChild(dupBtn);

    const delBtn = document.createElement('button');
    delBtn.id = 'del-btn';
    delBtn.textContent = 'Delete Plan';
    delBtn.className = 'btn-danger';
    topbar.appendChild(delBtn);

    const sep2 = document.createElement('div');
    sep2.className = 'sep';
    topbar.appendChild(sep2);

    const frontBtn = document.createElement('button');
    frontBtn.id = 'front-btn';
    frontBtn.textContent = 'Front View';
    topbar.appendChild(frontBtn);

    // --- Build sidebar header ---
    const sidebarHeader = document.getElementById('sidebar-header');
    const plantsTitle = document.createElement('span');
    plantsTitle.textContent = 'Plants';
    sidebarHeader.appendChild(plantsTitle);

    // --- Add plant button ---
    const addPlantBtn = document.getElementById('add-plant-btn');
    addPlantBtn.textContent = '+ Custom Plant';

    // --- State ---
    let plants = [];
    let selectedPlant = null;
    let gardens = [];
    let currentGarden = null;
    let plansList = [];
    let currentPlan = null;
    let gridData = {};
    let viewMode = 'topdown';
    const CELL_SIZE = 50;
    let scale = 1;
    let offsetX = 20;
    let offsetY = 20;
    let isPanning = false;
    let panStartX = 0, panStartY = 0;
    let panStartOffX = 0, panStartOffY = 0;
    let selectedCell = null;
    let saveTimeout = null;

    const canvas = document.getElementById('garden-canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    // --- Plant loading and palette ---
    function loadPlants() {
        fetch('/api/plants')
            .then(r => r.json())
            .then(data => {
                plants = data;
                renderPalette();
            });
    }

    function renderPalette() {
        const palette = document.getElementById('palette');
        palette.textContent = '';
        const groups = {};
        for (const p of plants) {
            const cat = p.category || 'other';
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(p);
        }
        const order = ['vegetable', 'flower', 'other'];
        const labels = { vegetable: 'Vegetables', flower: 'Flowers', other: 'Other' };
        for (const cat of order) {
            if (!groups[cat]) continue;
            const heading = document.createElement('div');
            heading.className = 'palette-category';
            heading.textContent = labels[cat] || cat;
            palette.appendChild(heading);
            for (const p of groups[cat]) {
                const item = document.createElement('div');
                item.className = 'palette-item';
                if (selectedPlant && selectedPlant.name === p.name) {
                    item.classList.add('selected');
                }
                const swatch = document.createElement('span');
                swatch.className = 'palette-swatch';
                swatch.style.background = p.color;
                item.appendChild(swatch);
                const name = document.createElement('span');
                name.textContent = p.name;
                item.appendChild(name);
                item.addEventListener('click', () => {
                    if (selectedPlant && selectedPlant.name === p.name) {
                        selectedPlant = null;
                    } else {
                        selectedPlant = p;
                    }
                    renderPalette();
                });
                palette.appendChild(item);
            }
        }
    }

    // --- Garden/Plan management ---
    function loadGardens() {
        fetch('/api/gardens')
            .then(r => r.json())
            .then(data => {
                gardens = data;
                gardenSelect.textContent = '';
                if (gardens.length === 0) {
                    const opt = document.createElement('option');
                    opt.textContent = '(no gardens)';
                    opt.value = '';
                    gardenSelect.appendChild(opt);
                    planSelect.textContent = '';
                    currentGarden = null;
                    currentPlan = null;
                    gridData = {};
                    drawGrid();
                    return;
                }
                for (const g of gardens) {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name + ' (' + g.width + 'x' + g.depth + ')';
                    gardenSelect.appendChild(opt);
                }
                selectGarden(gardens[0].id);
            });
    }

    function selectGarden(id) {
        currentGarden = gardens.find(g => g.id === id) || null;
        if (!currentGarden) return;
        gardenSelect.value = id;
        fetch('/api/gardens/' + id + '/plans')
            .then(r => r.json())
            .then(data => {
                plansList = data;
                planSelect.textContent = '';
                if (plansList.length === 0) {
                    const opt = document.createElement('option');
                    opt.textContent = '(no plans)';
                    opt.value = '';
                    planSelect.appendChild(opt);
                    currentPlan = null;
                    gridData = {};
                    drawGrid();
                    return;
                }
                for (const p of plansList) {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    planSelect.appendChild(opt);
                }
                selectPlan(plansList[0].id);
            });
    }

    function selectPlan(id) {
        fetch('/api/plans/' + id)
            .then(r => r.json())
            .then(data => {
                currentPlan = data;
                gridData = data.grid_data || {};
                planSelect.value = id;
                drawGrid();
            });
    }

    gardenSelect.addEventListener('change', () => {
        const id = parseInt(gardenSelect.value);
        if (id) selectGarden(id);
    });

    planSelect.addEventListener('change', () => {
        const id = parseInt(planSelect.value);
        if (id) selectPlan(id);
    });

    newGardenBtn.addEventListener('click', () => {
        const name = prompt('Garden name:');
        if (!name) return;
        const width = parseInt(prompt('Width (sq ft):', '8'));
        if (!width || width < 1) return;
        const depth = parseInt(prompt('Depth (sq ft):', '4'));
        if (!depth || depth < 1) return;
        fetch('/api/gardens', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, width, depth })
        }).then(() => loadGardens());
    });

    newPlanBtn.addEventListener('click', () => {
        if (!currentGarden) return;
        const name = prompt('Plan name:', 'v1');
        if (!name) return;
        fetch('/api/gardens/' + currentGarden.id + '/plans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        }).then(() => selectGarden(currentGarden.id));
    });

    dupBtn.addEventListener('click', () => {
        if (!currentPlan) return;
        const name = prompt('Name for copy:', currentPlan.name + ' (copy)');
        if (!name) return;
        fetch('/api/plans/' + currentPlan.id + '/duplicate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        }).then(() => selectGarden(currentGarden.id));
    });

    delBtn.addEventListener('click', () => {
        if (!currentPlan) return;
        if (!confirm('Delete plan "' + currentPlan.name + '"?')) return;
        fetch('/api/plans/' + currentPlan.id, { method: 'DELETE' })
            .then(() => selectGarden(currentGarden.id));
    });

    // --- Canvas grid drawing ---
    function sizeCanvas() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }

    function getFootprint(spacing) {
        if (spacing >= 9) return 3;
        if (spacing >= 4) return 2;
        return 1;
    }

    function checkWarnings() {
        // Placeholder - Task 9
        return [];
    }

    function drawGrid() {
        if (viewMode === 'front') { drawFrontView(); return; }
        sizeCanvas();
        if (!currentGarden) return;
        const w = currentGarden.width;
        const d = currentGarden.depth;

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Garden background
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(0, 0, w * CELL_SIZE, d * CELL_SIZE);

        // Draw placed plants
        for (const key in gridData) {
            const cell = gridData[key];
            const parts = key.split(',');
            const row = parseInt(parts[0]);
            const col = parseInt(parts[1]);
            const x = col * CELL_SIZE;
            const y = row * CELL_SIZE;
            ctx.fillStyle = cell.color;
            ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(cell.label, x + CELL_SIZE / 2, y + CELL_SIZE / 2);
        }

        // Draw warnings
        const warnings = checkWarnings();
        for (const warn of warnings) {
            const parts = warn.cell.split(',');
            const row = parseInt(parts[0]);
            const col = parseInt(parts[1]);
            const x = col * CELL_SIZE;
            const y = row * CELL_SIZE;
            ctx.save();
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = warn.type === 'spacing' ? '#e74c3c' : '#f39c12';
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
            ctx.restore();
            // Warning icon
            ctx.fillStyle = warn.type === 'spacing' ? '#e74c3c' : '#f39c12';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText('!', x + CELL_SIZE - 4, y + 2);
        }

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.5;
        for (let r = 0; r <= d; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * CELL_SIZE);
            ctx.lineTo(w * CELL_SIZE, r * CELL_SIZE);
            ctx.stroke();
        }
        for (let c = 0; c <= w; c++) {
            ctx.beginPath();
            ctx.moveTo(c * CELL_SIZE, 0);
            ctx.lineTo(c * CELL_SIZE, d * CELL_SIZE);
            ctx.stroke();
        }

        // Row/col labels
        ctx.fillStyle = '#888';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let c = 0; c < w; c++) {
            ctx.fillText(String(c + 1), c * CELL_SIZE + CELL_SIZE / 2, d * CELL_SIZE + 4);
        }
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (let r = 0; r < d; r++) {
            ctx.fillText(String(r + 1), -4, r * CELL_SIZE + CELL_SIZE / 2);
        }

        // Selected cell highlight
        if (selectedCell && gridData[selectedCell]) {
            const parts = selectedCell.split(',');
            const row = parseInt(parts[0]);
            const col = parseInt(parts[1]);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        ctx.restore();
    }

    // --- Click to place/remove ---
    canvas.addEventListener('click', (e) => {
        if (viewMode !== 'topdown' || !currentGarden || !currentPlan) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left - offsetX) / scale;
        const my = (e.clientY - rect.top - offsetY) / scale;
        const col = Math.floor(mx / CELL_SIZE);
        const row = Math.floor(my / CELL_SIZE);
        if (col < 0 || col >= currentGarden.width || row < 0 || row >= currentGarden.depth) return;
        const key = row + ',' + col;

        if (gridData[key]) {
            // Remove plant (all cells sharing same origin)
            const origin = gridData[key].origin || key;
            const toRemove = [];
            for (const k in gridData) {
                if ((gridData[k].origin || k) === origin) toRemove.push(k);
            }
            for (const k of toRemove) delete gridData[k];
            selectedCell = null;
        } else if (selectedPlant) {
            // Place plant
            const foot = getFootprint(selectedPlant.spacing);
            for (let dr = 0; dr < foot; dr++) {
                for (let dc = 0; dc < foot; dc++) {
                    const pr = row + dr;
                    const pc = col + dc;
                    if (pr >= currentGarden.depth || pc >= currentGarden.width) continue;
                    const pk = pr + ',' + pc;
                    gridData[pk] = {
                        name: selectedPlant.name,
                        label: selectedPlant.label,
                        color: selectedPlant.color,
                        spacing: selectedPlant.spacing,
                        height: selectedPlant.height,
                        origin: key
                    };
                }
            }
        } else {
            // Select cell for keyboard delete
            selectedCell = gridData[key] ? key : null;
        }
        drawGrid();
        scheduleSave();
    });

    // --- Auto-save ---
    function scheduleSave() {
        if (!currentPlan) return;
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            fetch('/api/plans/' + currentPlan.id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ grid_data: gridData })
            });
        }, 500);
    }

    // Placeholder - Task 10
    function drawFrontView() {}

    // --- Resize handler ---
    window.addEventListener('resize', () => {
        if (viewMode === 'topdown') drawGrid();
        else drawFrontView();
    });

    // Init
    loadPlants();
    loadGardens();
})();
</script>
</body>
</html>

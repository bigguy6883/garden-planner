<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Planner</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.svg') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#2d5a27">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1d23;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #252830;
            border-bottom: 1px solid #3a3d45;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #topbar select, #topbar button {
            padding: 6px 10px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #2f323a;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
        }
        #topbar select { min-width: 140px; }
        #topbar button:hover { background: #3a3d45; }
        #topbar .sep { width: 1px; height: 24px; background: #3a3d45; margin: 0 4px; }
        .btn-danger { border-color: #c0392b !important; }
        .btn-danger:hover { background: #c0392b !important; }
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #20232a;
            border-right: 1px solid #3a3d45;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (max-width: 600px) {
            #sidebar {
                position: absolute;
                z-index: 50;
                height: 100%;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
            }
            #sidebar.open { transform: translateX(0); }
            #main { position: relative; }
            #sidebar-toggle { display: block !important; }
        }
        #sidebar-header {
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #3a3d45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #palette {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        #palette::-webkit-scrollbar { width: 6px; }
        #palette::-webkit-scrollbar-thumb { background: #3a3d45; border-radius: 3px; }
        .palette-category {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            padding: 8px 4px 4px;
            letter-spacing: 0.5px;
        }
        .palette-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .palette-item:hover { background: #2a2d35; }
        .palette-item.selected { background: #2a4a2a; outline: 1px solid #4a8a4a; }
        .palette-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        #add-plant-btn {
            margin: 0;
            padding: 10px 8px;
            border: none;
            border-top: 1px solid #3a3d45;
            border-radius: 0;
            background: #252830;
            color: #8ab88a;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            flex-shrink: 0;
        }
        #add-plant-btn:hover { background: #2a3a2a; color: #a0d8a0; }
        #sidebar-filters {
            padding: 8px;
            border-bottom: 1px solid #3a3d45;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #plant-search {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #1a1d23;
            color: #e0e0e0;
            font-size: 13px;
        }
        #category-tabs {
            display: flex;
            gap: 6px;
        }
        .category-tab {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #3a3d45;
            border-radius: 12px;
            background: #2f323a;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
        }
        .category-tab.active {
            background: #2a6a2a;
            border-color: #3a8a3a;
            color: #e0e0e0;
        }
        #selection-chip {
            display: none;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: #252830;
            border: 1px solid #3a3d45;
            border-radius: 20px;
            padding: 6px 12px;
            align-items: center;
            gap: 8px;
            z-index: 10;
            white-space: nowrap;
            height: 40px;
        }
        #selection-chip.visible { display: flex; }
        #selection-chip .chip-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        #selection-chip .chip-name {
            font-size: 13px;
            color: #e0e0e0;
        }
        #selection-chip .chip-dismiss {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            padding: 0 0 0 4px;
            line-height: 1;
        }
        #selection-chip .chip-dismiss:hover { color: #e0e0e0; }
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #garden-canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }
        #tooltip {
            display: none;
            position: absolute;
            background: #2f323a;
            border: 1px solid #4a4d55;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #252830;
            border: 1px solid #3a3d45;
            border-radius: 8px;
            padding: 20px;
            min-width: 300px;
        }
        .modal h3 { margin-bottom: 12px; font-size: 16px; }
        .modal label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin: 8px 0 4px;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #1a1d23;
            color: #e0e0e0;
            font-size: 13px;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .modal-buttons button {
            padding: 6px 16px;
            border: 1px solid #3a3d45;
            border-radius: 4px;
            background: #2f323a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 13px;
        }
        .modal-buttons button.primary { background: #2a6a2a; border-color: #3a8a3a; }
        .modal-buttons button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div id="topbar"></div>
    <div id="main">
        <div id="sidebar">
            <div id="sidebar-header"></div>
            <div id="sidebar-filters"></div>
            <div id="palette"></div>
            <button id="add-plant-btn"></button>
        </div>
        <div id="canvas-container">
            <canvas id="garden-canvas"></canvas>
            <div id="tooltip"></div>
            <div id="selection-chip"></div>
        </div>
    </div>
    <div id="plant-modal" class="modal-overlay"></div>

<script>
(function() {
    // --- Build topbar ---
    const topbar = document.getElementById('topbar');

    const sidebarToggle = document.createElement('button');
    sidebarToggle.id = 'sidebar-toggle';
    sidebarToggle.textContent = 'Plants';
    sidebarToggle.style.display = 'none';
    sidebarToggle.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });
    topbar.appendChild(sidebarToggle);

    const gardenLabel = document.createElement('span');
    gardenLabel.textContent = 'Garden:';
    gardenLabel.style.fontSize = '13px';
    topbar.appendChild(gardenLabel);

    const gardenSelect = document.createElement('select');
    gardenSelect.id = 'garden-select';
    topbar.appendChild(gardenSelect);

    const newGardenBtn = document.createElement('button');
    newGardenBtn.id = 'new-garden-btn';
    newGardenBtn.textContent = 'New Garden';
    topbar.appendChild(newGardenBtn);

    const sep1 = document.createElement('div');
    sep1.className = 'sep';
    topbar.appendChild(sep1);

    const planLabel = document.createElement('span');
    planLabel.textContent = 'Plan:';
    planLabel.style.fontSize = '13px';
    topbar.appendChild(planLabel);

    const planSelect = document.createElement('select');
    planSelect.id = 'plan-select';
    topbar.appendChild(planSelect);

    const newPlanBtn = document.createElement('button');
    newPlanBtn.id = 'new-plan-btn';
    newPlanBtn.textContent = 'New Plan';
    topbar.appendChild(newPlanBtn);

    const dupBtn = document.createElement('button');
    dupBtn.id = 'dup-btn';
    dupBtn.textContent = 'Duplicate';
    topbar.appendChild(dupBtn);

    const delBtn = document.createElement('button');
    delBtn.id = 'del-btn';
    delBtn.textContent = 'Delete Plan';
    delBtn.className = 'btn-danger';
    topbar.appendChild(delBtn);

    const sep2 = document.createElement('div');
    sep2.className = 'sep';
    topbar.appendChild(sep2);

    const frontBtn = document.createElement('button');
    frontBtn.id = 'front-btn';
    frontBtn.textContent = 'Front View';
    topbar.appendChild(frontBtn);

    // --- Build sidebar header ---
    const sidebarHeader = document.getElementById('sidebar-header');
    const plantsTitle = document.createElement('span');
    plantsTitle.textContent = 'Plants';
    sidebarHeader.appendChild(plantsTitle);

    // --- Build sidebar filters ---
    const sidebarFilters = document.getElementById('sidebar-filters');

    const plantSearch = document.createElement('input');
    plantSearch.type = 'text';
    plantSearch.id = 'plant-search';
    plantSearch.placeholder = 'Search plants...';
    plantSearch.addEventListener('input', () => {
        searchFilter = plantSearch.value.toLowerCase();
        renderPalette();
    });
    sidebarFilters.appendChild(plantSearch);

    const categoryTabs = document.createElement('div');
    categoryTabs.id = 'category-tabs';

    const activeTabs = new Set(['vegetable', 'herb', 'flower']);

    function createTab(label, category) {
        const tab = document.createElement('button');
        tab.className = 'category-tab active';
        tab.textContent = label;
        tab.addEventListener('click', () => {
            if (activeTabs.has(category)) {
                if (activeTabs.size <= 1) return;
                activeTabs.delete(category);
                tab.classList.remove('active');
            } else {
                activeTabs.add(category);
                tab.classList.add('active');
            }
            renderPalette();
        });
        categoryTabs.appendChild(tab);
        return tab;
    }

    createTab('Vegetables', 'vegetable');
    createTab('Herbs', 'herb');
    createTab('Flowers', 'flower');
    sidebarFilters.appendChild(categoryTabs);

    let searchFilter = '';

    // --- Build selection chip ---
    const selectionChip = document.getElementById('selection-chip');
    const chipSwatch = document.createElement('span');
    chipSwatch.className = 'chip-swatch';
    selectionChip.appendChild(chipSwatch);
    const chipName = document.createElement('span');
    chipName.className = 'chip-name';
    selectionChip.appendChild(chipName);
    const chipDismiss = document.createElement('button');
    chipDismiss.className = 'chip-dismiss';
    chipDismiss.textContent = '\u00d7';
    chipDismiss.addEventListener('click', () => {
        selectedPlant = null;
        updateSelectionChip();
        renderPalette();
    });
    selectionChip.appendChild(chipDismiss);

    function updateSelectionChip() {
        if (selectedPlant) {
            chipSwatch.style.background = selectedPlant.color;
            chipName.textContent = selectedPlant.name;
            selectionChip.classList.add('visible');
        } else {
            selectionChip.classList.remove('visible');
        }
    }

    // --- Add plant button ---
    const addPlantBtn = document.getElementById('add-plant-btn');
    addPlantBtn.textContent = '+ Custom Plant';

    // --- Build custom plant modal ---
    const modalOverlay = document.getElementById('plant-modal');
    const modal = document.createElement('div');
    modal.className = 'modal';
    const modalTitle = document.createElement('h3');
    modalTitle.textContent = 'Add Custom Plant';
    modal.appendChild(modalTitle);

    function addField(labelText, inputEl) {
        const lbl = document.createElement('label');
        lbl.textContent = labelText;
        modal.appendChild(lbl);
        modal.appendChild(inputEl);
        return inputEl;
    }

    const cpName = addField('Name', document.createElement('input'));
    cpName.type = 'text'; cpName.placeholder = 'e.g. Marigold';

    const cpLabel = addField('Label (2-3 chars)', document.createElement('input'));
    cpLabel.type = 'text'; cpLabel.maxLength = 3; cpLabel.placeholder = 'e.g. Mar';

    const cpColor = addField('Color', document.createElement('input'));
    cpColor.type = 'color'; cpColor.value = '#e67e22';

    const cpSpacing = addField('Spacing', document.createElement('select'));
    for (const [val, txt] of [['1','1 sq ft (1x1)'],['4','4 sq ft (2x2)'],['9','9 sq ft (3x3)']]) {
        const o = document.createElement('option'); o.value = val; o.textContent = txt;
        cpSpacing.appendChild(o);
    }

    const cpHeight = addField('Height', document.createElement('select'));
    for (const h of ['short','medium','tall']) {
        const o = document.createElement('option'); o.value = h; o.textContent = h;
        cpHeight.appendChild(o);
    }
    cpHeight.value = 'medium';

    const cpCategory = addField('Category', document.createElement('select'));
    for (const c of ['vegetable','herb','flower']) {
        const o = document.createElement('option'); o.value = c; o.textContent = c;
        cpCategory.appendChild(o);
    }

    const cpSun = addField('Sun', document.createElement('select'));
    for (const [val, txt] of [['full','Full Sun'],['partial','Partial Sun'],['shade','Shade']]) {
        const o = document.createElement('option'); o.value = val; o.textContent = txt;
        cpSun.appendChild(o);
    }

    const modalBtns = document.createElement('div');
    modalBtns.className = 'modal-buttons';
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
    const saveBtn = document.createElement('button');
    saveBtn.textContent = 'Save';
    saveBtn.className = 'primary';
    saveBtn.addEventListener('click', () => {
        const name = cpName.value.trim();
        const label = cpLabel.value.trim();
        if (!name || !label) return;
        fetch('/api/plants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name, label,
                color: cpColor.value,
                spacing: parseInt(cpSpacing.value),
                height: cpHeight.value,
                category: cpCategory.value,
                sun: cpSun.value
            })
        }).then(() => {
            modalOverlay.classList.remove('active');
            cpName.value = ''; cpLabel.value = '';
            loadPlants();
        });
    });
    modalBtns.appendChild(cancelBtn);
    modalBtns.appendChild(saveBtn);
    modal.appendChild(modalBtns);
    modalOverlay.appendChild(modal);

    addPlantBtn.addEventListener('click', () => {
        modalOverlay.classList.add('active');
    });

    // --- State ---
    let plants = [];
    let selectedPlant = null;
    let gardens = [];
    let currentGarden = null;
    let plansList = [];
    let currentPlan = null;
    let gridData = {};
    let viewMode = 'topdown';
    const CELL_SIZE = 50;
    let scale = 1;
    let offsetX = 20;
    let offsetY = 20;
    let isPanning = false;
    let panStartX = 0, panStartY = 0;
    let panStartOffX = 0, panStartOffY = 0;
    let selectedCell = null;
    let saveTimeout = null;

    const canvas = document.getElementById('garden-canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    // --- Plant loading and palette ---
    function loadPlants() {
        fetch('/api/plants')
            .then(r => r.json())
            .then(data => {
                plants = data;
                renderPalette();
            });
    }

    function renderPalette() {
        const palette = document.getElementById('palette');
        palette.textContent = '';
        const groups = {};
        for (const p of plants) {
            const cat = p.category || 'other';
            if (!activeTabs.has(cat)) continue;
            if (searchFilter && p.name.toLowerCase().indexOf(searchFilter) === -1) continue;
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(p);
        }
        const order = ['vegetable', 'herb', 'flower', 'other'];
        const labels = { vegetable: 'Vegetables', herb: 'Herbs', flower: 'Flowers', other: 'Other' };
        for (const cat of order) {
            if (!groups[cat]) continue;
            const heading = document.createElement('div');
            heading.className = 'palette-category';
            heading.textContent = labels[cat] || cat;
            palette.appendChild(heading);
            for (const p of groups[cat]) {
                const item = document.createElement('div');
                item.className = 'palette-item';
                if (selectedPlant && selectedPlant.name === p.name) {
                    item.classList.add('selected');
                }
                const swatch = document.createElement('span');
                swatch.className = 'palette-swatch';
                swatch.style.background = p.color;
                item.appendChild(swatch);
                const name = document.createElement('span');
                name.textContent = p.name;
                item.appendChild(name);
                item.addEventListener('click', () => {
                    if (selectedPlant && selectedPlant.name === p.name) {
                        selectedPlant = null;
                    } else {
                        selectedPlant = p;
                    }
                    updateSelectionChip();
                    renderPalette();
                    // Close sidebar on mobile after selection
                    if (window.innerWidth <= 600) {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                });
                palette.appendChild(item);
            }
        }
    }

    // --- Garden/Plan management ---
    function loadGardens() {
        fetch('/api/gardens')
            .then(r => r.json())
            .then(data => {
                gardens = data;
                gardenSelect.textContent = '';
                if (gardens.length === 0) {
                    const opt = document.createElement('option');
                    opt.textContent = '(no gardens)';
                    opt.value = '';
                    gardenSelect.appendChild(opt);
                    planSelect.textContent = '';
                    currentGarden = null;
                    currentPlan = null;
                    gridData = {};
                    drawGrid();
                    return;
                }
                for (const g of gardens) {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name + ' (' + g.width + 'x' + g.depth + ')';
                    gardenSelect.appendChild(opt);
                }
                selectGarden(gardens[0].id);
            });
    }

    function selectGarden(id) {
        currentGarden = gardens.find(g => g.id === id) || null;
        if (!currentGarden) return;
        gardenSelect.value = id;
        fetch('/api/gardens/' + id + '/plans')
            .then(r => r.json())
            .then(data => {
                plansList = data;
                planSelect.textContent = '';
                if (plansList.length === 0) {
                    const opt = document.createElement('option');
                    opt.textContent = '(no plans)';
                    opt.value = '';
                    planSelect.appendChild(opt);
                    currentPlan = null;
                    gridData = {};
                    drawGrid();
                    return;
                }
                for (const p of plansList) {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    planSelect.appendChild(opt);
                }
                selectPlan(plansList[0].id);
            });
    }

    function selectPlan(id) {
        fetch('/api/plans/' + id)
            .then(r => r.json())
            .then(data => {
                currentPlan = data;
                gridData = data.grid_data || {};
                planSelect.value = id;
                drawGrid();
            });
    }

    gardenSelect.addEventListener('change', () => {
        const id = parseInt(gardenSelect.value);
        if (id) selectGarden(id);
    });

    planSelect.addEventListener('change', () => {
        const id = parseInt(planSelect.value);
        if (id) selectPlan(id);
    });

    newGardenBtn.addEventListener('click', () => {
        const name = prompt('Garden name:');
        if (!name) return;
        const width = parseInt(prompt('Width (sq ft):', '8'));
        if (!width || width < 1) return;
        const depth = parseInt(prompt('Depth (sq ft):', '4'));
        if (!depth || depth < 1) return;
        fetch('/api/gardens', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, width, depth })
        }).then(() => loadGardens());
    });

    newPlanBtn.addEventListener('click', () => {
        if (!currentGarden) return;
        const name = prompt('Plan name:', 'v1');
        if (!name) return;
        fetch('/api/gardens/' + currentGarden.id + '/plans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        }).then(() => selectGarden(currentGarden.id));
    });

    dupBtn.addEventListener('click', () => {
        if (!currentPlan) return;
        const name = prompt('Name for copy:', currentPlan.name + ' (copy)');
        if (!name) return;
        fetch('/api/plans/' + currentPlan.id + '/duplicate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        }).then(() => selectGarden(currentGarden.id));
    });

    delBtn.addEventListener('click', () => {
        if (!currentPlan) return;
        if (!confirm('Delete plan "' + currentPlan.name + '"?')) return;
        fetch('/api/plans/' + currentPlan.id, { method: 'DELETE' })
            .then(() => selectGarden(currentGarden.id));
    });

    // --- Canvas grid drawing ---
    function sizeCanvas() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }

    function getFootprint(spacing) {
        if (spacing >= 9) return 3;
        if (spacing >= 4) return 2;
        return 1;
    }

    function checkWarnings() {
        if (!currentGarden) return [];
        const w = currentGarden.width;
        const d = currentGarden.depth;
        const warnings = [];
        const heightRank = { short: 1, medium: 2, tall: 3 };

        // Spacing check: group cells by origin, check if footprint is complete
        const origins = {};
        for (const key in gridData) {
            const cell = gridData[key];
            const origin = cell.origin || key;
            if (!origins[origin]) origins[origin] = { cells: [], spacing: cell.spacing };
            origins[origin].cells.push(key);
        }
        for (const origin in origins) {
            const group = origins[origin];
            const foot = getFootprint(group.spacing);
            const expected = foot * foot;
            if (group.cells.length < expected) {
                for (const key of group.cells) {
                    warnings.push({ cell: key, type: 'spacing', msg: 'Insufficient space (' + group.cells.length + '/' + expected + ' cells)' });
                }
            }
        }

        // Visibility check: for each column, walk from front (high row) to back (row 0)
        for (let c = 0; c < w; c++) {
            let maxRank = 0;
            for (let r = d - 1; r >= 0; r--) {
                const key = r + ',' + c;
                if (!gridData[key]) continue;
                const rank = heightRank[gridData[key].height] || 2;
                if (rank < maxRank) {
                    warnings.push({ cell: key, type: 'visibility', msg: gridData[key].name + ' may be blocked by taller plant in front' });
                }
                if (rank > maxRank) maxRank = rank;
            }
        }

        return warnings;
    }

    function drawGrid() {
        if (viewMode === 'front') { drawFrontView(); return; }
        sizeCanvas();
        if (!currentGarden) return;
        const w = currentGarden.width;
        const d = currentGarden.depth;

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Garden background
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(0, 0, w * CELL_SIZE, d * CELL_SIZE);

        // Draw placed plants
        for (const key in gridData) {
            const cell = gridData[key];
            const parts = key.split(',');
            const row = parseInt(parts[0]);
            const col = parseInt(parts[1]);
            const x = col * CELL_SIZE;
            const y = row * CELL_SIZE;
            ctx.fillStyle = cell.color;
            ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(cell.label, x + CELL_SIZE / 2, y + CELL_SIZE / 2);
        }

        // Draw warnings
        const warnings = checkWarnings();
        for (const warn of warnings) {
            const parts = warn.cell.split(',');
            const row = parseInt(parts[0]);
            const col = parseInt(parts[1]);
            const x = col * CELL_SIZE;
            const y = row * CELL_SIZE;
            ctx.save();
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = warn.type === 'spacing' ? '#e74c3c' : '#f39c12';
            ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
            ctx.restore();
            // Warning icon
            ctx.fillStyle = warn.type === 'spacing' ? '#e74c3c' : '#f39c12';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText('!', x + CELL_SIZE - 4, y + 2);
        }

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.5;
        for (let r = 0; r <= d; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * CELL_SIZE);
            ctx.lineTo(w * CELL_SIZE, r * CELL_SIZE);
            ctx.stroke();
        }
        for (let c = 0; c <= w; c++) {
            ctx.beginPath();
            ctx.moveTo(c * CELL_SIZE, 0);
            ctx.lineTo(c * CELL_SIZE, d * CELL_SIZE);
            ctx.stroke();
        }

        // Row/col labels
        ctx.fillStyle = '#888';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let c = 0; c < w; c++) {
            ctx.fillText(String(c + 1), c * CELL_SIZE + CELL_SIZE / 2, d * CELL_SIZE + 4);
        }
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (let r = 0; r < d; r++) {
            ctx.fillText(String(r + 1), -4, r * CELL_SIZE + CELL_SIZE / 2);
        }

        // Selected cell highlight
        if (selectedCell && gridData[selectedCell]) {
            const parts = selectedCell.split(',');
            const row = parseInt(parts[0]);
            const col = parseInt(parts[1]);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        ctx.restore();
    }

    // --- Coordinate helpers ---
    function canvasCoords(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const mx = (clientX - rect.left - offsetX) / scale;
        const my = (clientY - rect.top - offsetY) / scale;
        return {
            col: Math.floor(mx / CELL_SIZE),
            row: Math.floor(my / CELL_SIZE)
        };
    }

    function handlePlacement(clientX, clientY) {
        if (viewMode !== 'topdown' || !currentGarden || !currentPlan) return;
        const { col, row } = canvasCoords(clientX, clientY);
        if (col < 0 || col >= currentGarden.width || row < 0 || row >= currentGarden.depth) return;
        const key = row + ',' + col;

        if (gridData[key]) {
            // Remove plant (all cells sharing same origin)
            const origin = gridData[key].origin || key;
            const toRemove = [];
            for (const k in gridData) {
                if ((gridData[k].origin || k) === origin) toRemove.push(k);
            }
            for (const k of toRemove) delete gridData[k];
            selectedCell = null;
        } else if (selectedPlant) {
            // Place plant
            const foot = getFootprint(selectedPlant.spacing);
            for (let dr = 0; dr < foot; dr++) {
                for (let dc = 0; dc < foot; dc++) {
                    const pr = row + dr;
                    const pc = col + dc;
                    if (pr >= currentGarden.depth || pc >= currentGarden.width) continue;
                    const pk = pr + ',' + pc;
                    gridData[pk] = {
                        name: selectedPlant.name,
                        label: selectedPlant.label,
                        color: selectedPlant.color,
                        spacing: selectedPlant.spacing,
                        height: selectedPlant.height,
                        sun: selectedPlant.sun,
                        origin: key
                    };
                }
            }
        } else {
            // Select cell for keyboard delete
            selectedCell = gridData[key] ? key : null;
        }
        drawGrid();
        scheduleSave();
    }

    // --- Mouse click to place/remove ---
    let didPan = false;
    canvas.addEventListener('click', (e) => {
        if (didPan) { didPan = false; return; }
        handlePlacement(e.clientX, e.clientY);
    });

    // --- Touch support ---
    let touchStartX = 0, touchStartY = 0;
    let touchIsPan = false;

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            touchIsPan = false;
            panStartX = t.clientX;
            panStartY = t.clientY;
            panStartOffX = offsetX;
            panStartOffY = offsetY;
        }
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
            const t = e.touches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                touchIsPan = true;
                offsetX = panStartOffX + dx;
                offsetY = panStartOffY + dy;
                drawGrid();
            }
        }
        // Pinch zoom with 2 fingers
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        if (!touchIsPan && e.changedTouches.length === 1) {
            const t = e.changedTouches[0];
            handlePlacement(t.clientX, t.clientY);
        }
        touchIsPan = false;
        e.preventDefault();
    }, { passive: false });

    // --- Scroll to zoom ---
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.1 : 0.9;
        scale = Math.max(0.3, Math.min(3, scale * factor));
        drawGrid();
    }, { passive: false });

    // --- Drag to pan (mouse) ---
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 1 || e.button === 0) {
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartOffX = offsetX;
            panStartOffY = offsetY;
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (isPanning) {
            const dx = e.clientX - panStartX;
            const dy = e.clientY - panStartY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                didPan = true;
                canvas.style.cursor = 'grabbing';
                offsetX = panStartOffX + dx;
                offsetY = panStartOffY + dy;
                drawGrid();
                tooltip.style.display = 'none';
            }
            return;
        }
        // Hover tooltip
        if (viewMode !== 'topdown' || !currentGarden) return;
        const { col, row } = canvasCoords(e.clientX, e.clientY);
        const key = row + ',' + col;
        if (col >= 0 && col < currentGarden.width && row >= 0 && row < currentGarden.depth && gridData[key]) {
            const cell = gridData[key];
            const sunLabel = { full: 'Full Sun', partial: 'Partial Sun', shade: 'Shade' };
            tooltip.textContent = cell.name + ' | Height: ' + cell.height + ' | Space: ' + cell.spacing + ' sq ft | ' + (sunLabel[cell.sun] || 'Full Sun');
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX - canvas.parentElement.getBoundingClientRect().left + 12) + 'px';
            tooltip.style.top = (e.clientY - canvas.parentElement.getBoundingClientRect().top - 10) + 'px';
        } else {
            tooltip.style.display = 'none';
        }
    });

    canvas.addEventListener('mouseup', () => {
        if (isPanning) {
            isPanning = false;
            canvas.style.cursor = 'crosshair';
        }
    });

    canvas.addEventListener('mouseleave', () => {
        if (isPanning) {
            isPanning = false;
            canvas.style.cursor = 'crosshair';
        }
        tooltip.style.display = 'none';
    });

    // --- Keyboard delete ---
    document.addEventListener('keydown', (e) => {
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedCell && gridData[selectedCell]) {
            const origin = gridData[selectedCell].origin || selectedCell;
            const toRemove = [];
            for (const k in gridData) {
                if ((gridData[k].origin || k) === origin) toRemove.push(k);
            }
            for (const k of toRemove) delete gridData[k];
            selectedCell = null;
            drawGrid();
            scheduleSave();
            e.preventDefault();
        }
    });

    // --- Auto-save ---
    function scheduleSave() {
        if (!currentPlan) return;
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            fetch('/api/plans/' + currentPlan.id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ grid_data: gridData })
            });
        }, 500);
    }

    // --- Front profile view ---
    function drawFrontView() {
        sizeCanvas();
        if (!currentGarden) return;
        const w = currentGarden.width;
        const d = currentGarden.depth;
        const heightPx = { short: 30, medium: 70, tall: 120 };
        const baseY = canvas.height - 60;

        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1a1d23';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Ground line
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(20, baseY);
        ctx.lineTo(20 + w * CELL_SIZE, baseY);
        ctx.stroke();

        // Draw plants column by column, back to front
        for (let c = 0; c < w; c++) {
            for (let r = 0; r < d; r++) {
                const key = r + ',' + c;
                if (!gridData[key]) continue;
                const cell = gridData[key];
                const h = heightPx[cell.height] || 70;
                const x = 20 + c * CELL_SIZE;
                const depthOffset = (d - 1 - r) * 4;
                const y = baseY - h - depthOffset;

                ctx.save();
                ctx.globalAlpha = r < d - 1 ? 0.7 : 1.0;
                ctx.fillStyle = cell.color;
                ctx.fillRect(x + 2, y, CELL_SIZE - 4, h);
                // Label
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(cell.label, x + CELL_SIZE / 2, y + h / 2);
                ctx.restore();
            }
        }

        // Column labels
        ctx.fillStyle = '#888';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let c = 0; c < w; c++) {
            ctx.fillText(String(c + 1), 20 + c * CELL_SIZE + CELL_SIZE / 2, baseY + 8);
        }

        // Height legend
        ctx.fillStyle = '#666';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        const legendX = 20 + w * CELL_SIZE + 20;
        ctx.fillText('tall (3ft+)', legendX, baseY - 120);
        ctx.fillText('medium (1-3ft)', legendX, baseY - 70);
        ctx.fillText('short (<1ft)', legendX, baseY - 30);
        // Height guide lines
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        for (const h of [30, 70, 120]) {
            ctx.beginPath();
            ctx.moveTo(20, baseY - h);
            ctx.lineTo(20 + w * CELL_SIZE, baseY - h);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        ctx.restore();
    }

    // --- Front view toggle ---
    frontBtn.addEventListener('click', () => {
        if (viewMode === 'topdown') {
            viewMode = 'front';
            frontBtn.textContent = 'Top-Down View';
        } else {
            viewMode = 'topdown';
            frontBtn.textContent = 'Front View';
        }
        if (viewMode === 'topdown') drawGrid();
        else drawFrontView();
    });

    // --- Resize handler ---
    window.addEventListener('resize', () => {
        if (viewMode === 'topdown') drawGrid();
        else drawFrontView();
    });

    // Init
    loadPlants();
    loadGardens();
})();
</script>
</body>
</html>
